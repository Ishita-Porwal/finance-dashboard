<!DOCTYPE html>
<html>
<head>
    <title>Finance Dashboard</title>
</head>
<body>

<h1>Finance Dashboard</h1>

<button onclick="addRecord()">Add Record</button>

<script>
function addRecord() {
    fetch("/records", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "role": "Admin"
        },
        body: JSON.stringify({
            amount: 500,
            type: "income",
            category: "salary",
            date: "2026-04-05"
        })
    })
    .then(res => res.json())
    .then(data => console.log(data));
}
</script>

</body>
</html>
